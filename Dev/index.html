<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radar Tasks (Email Based)</title>

<style>
body {
  margin:0;
  font-family: Consolas, monospace;
  background:#020604;
  color:#8cffad;
  overflow:hidden;
}

/* RADAR */
#radar {
  position:fixed;
  width:600px;
  height:600px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
}

.ring { position:absolute; border:1px solid rgba(0,255,120,.2); border-radius:50%; }
.r1 { inset:10%; }
.r2 { inset:25%; }
.r3 { inset:40%; }

#sweep {
  position:absolute;
  inset:0;
  border-radius:50%;
  background:conic-gradient(from 0deg, rgba(0,255,120,.35), transparent 70%);
  animation:spin 4s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

.radar-target {
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  opacity:0;
  transition:opacity .4s;
}

.low { background:#00ff7f; }
.med { background:#ffbf00; }
.high { background:#ff3333; }
.severe { background:#8b0000; }
.critical { background:#5b0000; }

/* UI */
.panel {
  position:relative;
  z-index:10;
  width:420px;
  height:100vh;
  padding:20px;
  border-right:1px solid rgba(0,255,120,.2);
}

.toolbar input, select, button {
  width:100%;
  margin-bottom:6px;
  background:#03120a;
  border:1px solid rgba(0,255,120,.3);
  color:#8cffad;
  padding:6px;
  font-family:inherit;
}

.list {
  margin-top:10px;
  border:1px solid rgba(0,255,120,.2);
  height:55vh;
  overflow-y:auto;
  padding:6px;
}

.task {
  background:#052016;
  padding:6px;
  margin-top:6px;
  position:relative;
}

.task button {
  position:absolute;
  right:6px;
  top:6px;
  background:none;
  border:none;
  color:#8cffad;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="radar">
  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <div class="ring r3"></div>
  <div id="sweep"></div>
</div>

<div class="panel">
  <h3>User Email</h3>
  <input id="email" placeholder="you@example.com">

  <h3>New Task</h3>
  <input id="text" placeholder="Task description">
  <input id="date" type="date">
  <select id="prio">
    <option value="low">LOW</option>
    <option value="med">MED</option>
    <option value="high">HIGH</option>
    <option value="severe">SEVERE</option>
    <option value="critical">CRITICAL</option>
  </select>
  <button id="add">ADD</button>

  <div id="list" class="list"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyRFacxW76i7hw43bNGBNlHToNyjYJkSQNTkm9WGVYu5cWY33aHxMyb1UKpx6scuV1Jbw/exec"
let tasks = [];
let radarTargets = [];

const radius = {
  critical:60,
  severe:110,
  high:170,
  med:230,
  low:290
};

const emailInput = document.getElementById("email");
const textInput  = document.getElementById("text");
const dateInput  = document.getElementById("date");
const prioInput  = document.getElementById("prio");
const addBtn     = document.getElementById("add");
const list       = document.getElementById("list");
const radar      = document.getElementById("radar");

emailInput.addEventListener("change", loadTasks);
addBtn.addEventListener("click", addTask);

function loadTasks() {
  if (!emailInput.value) return;

  fetch(API_URL + "?email=" + encodeURIComponent(emailInput.value))
    .then(r => r.json())
    .then(data => {
      tasks = data.map(t => ({
        id: t.id,
        text: t.text,
        date: t.due,
        prio: t.prio,
        angle: Math.random() * Math.PI * 2
      }));
      render();
    });
}

function addTask() {
  if (!emailInput.value || !textInput.value || !dateInput.value) return;

  const task = {
    id: Date.now(),
    email: emailInput.value,
    text: textInput.value,
    due: dateInput.value,
    prio: prioInput.value
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "add", ...task })
  });

  tasks.push({ ...task, date: task.due, angle: Math.random() * Math.PI * 2 });
  textInput.value = "";
  dateInput.value = "";
  render();
}

function deleteTask(id) {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "delete",
      id,
      email: emailInput.value
    })
  });

  tasks = tasks.filter(t => t.id !== id);
  render();
}

function render() {
  list.innerHTML = "";
  radarTargets.forEach(el => el.remove());
  radarTargets = [];

  tasks.forEach(t => {
    const el = document.createElement("div");
    el.className = "task " + t.prio;
    el.innerHTML = t.text + "<br><small>DUE: " + t.date + "</small>";

    const del = document.createElement("button");
    del.textContent = "DONE";
    del.onclick = () => deleteTask(t.id);

    el.appendChild(del);
    list.appendChild(el);

    const dot = document.createElement("div");
    dot.className = "radar-target " + t.prio;

    const r = radius[t.prio];
    dot.style.left = (300 + Math.cos(t.angle) * r) + "px";
    dot.style.top  = (300 + Math.sin(t.angle) * r) + "px";

    radar.appendChild(dot);
    radarTargets.push(dot);
  });
}

/* Sweep */
setInterval(() => {
  radarTargets.forEach(el => {
    el.style.opacity = 1;
    setTimeout(() => el.style.opacity = 0, 400);
  });
}, 700);
</script>

</body>
</html>
