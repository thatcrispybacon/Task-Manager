<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radar Task Manager</title>

<style>
body {
  margin:0;
  font-family: Consolas, monospace;
  background:#020604;
  color:#8cffad;
  overflow:hidden;
}

/* ===== RADAR ===== */
#radar {
  position:fixed;
  width:600px;
  height:600px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
}

.ring {
  position:absolute;
  border:1px solid rgba(0,255,120,.2);
  border-radius:50%;
}
.r1 { inset:10%; }
.r2 { inset:25%; }
.r3 { inset:40%; }

#sweep {
  position:absolute;
  inset:0;
  border-radius:50%;
  background:conic-gradient(from 0deg, rgba(0,255,120,.35), transparent 70%);
  animation:spin 4s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

.radar-target {
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  opacity:0;
  transition:opacity .5s;
}

.low { background:#00ff7f; }
.med { background:#ffbf00; }
.high { background:#ff3333; }
.severe { background:#8b0000; }
.critical { background:#5b0000; }

/* ===== UI ===== */
.panel {
  position:relative;
  z-index:10;
  width:420px;
  height:100vh;
  padding:20px;
  background:#020604;
  border-right:1px solid rgba(0,255,120,.2);
}

.toolbar {
  display:flex;
  gap:6px;
  margin-bottom:10px;
}

input, select, button {
  background:#03120a;
  border:1px solid rgba(0,255,120,.3);
  color:#8cffad;
  padding:6px;
  font-family:inherit;
}

.list {
  margin-top:10px;
  border:1px solid rgba(0,255,120,.2);
  height:70vh;
  overflow-y:auto;
  padding:6px;
}

.task {
  background:#052016;
  padding:6px;
  margin-top:6px;
  position:relative;
}

.task small {
  display:block;
  font-size:11px;
  opacity:.7;
}

.task button {
  position:absolute;
  right:6px;
  top:6px;
  background:none;
  border:none;
  color:#8cffad;
  cursor:pointer;
  font-size:10px;
}
</style>
</head>

<body>

<div id="radar">
  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <div class="ring r3"></div>
  <div id="sweep"></div>
</div>

<div class="panel">
  <h2>Tasks</h2>

  <div class="toolbar">
    <input id="text" placeholder="Task">
    <input id="date" type="date">
    <select id="prio">
      <option value="low">LOW</option>
      <option value="med">MED</option>
      <option value="high">HIGH</option>
      <option value="severe">SEVERE</option>
      <option value="critical">CRITICAL</option>
    </select>
    <button id="add">ADD</button>
  </div>

  <div id="list" class="list"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyRFacxW76i7hw43bNGBNlHToNyjYJkSQNTkm9WGVYu5cWY33aHxMyb1UKpx6scuV1Jbw/exec";

let tasks = [];

document.addEventListener("DOMContentLoaded", loadTasks);

function loadTasks() {
  fetch(API_URL)
    .then(r => r.json())
    .then(data => {
      tasks = data.map(t => ({
        id: t.id,
        text: t.text,
        date: t.due,
        prio: t.prio,
        angle: Math.random() * Math.PI * 2
      }));
      render();
    })
    .catch(err => console.error("LOAD ERROR", err));
}

function addTask(text, date, prio) {
  const task = {
    id: Date.now(),
    text,
    due: date,
    prio
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "add", ...task })
  });

  tasks.push({ ...task, angle: Math.random() * Math.PI * 2 });
  render();
}

function deleteTask(id) {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "delete", id })
  });

  tasks = tasks.filter(t => t.id !== id);
  render();
}
</script>

</body>
</html>
